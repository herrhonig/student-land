---
pre-commit:
  parallel: false
  commands:
    prettier:
      run: npx prettier --write {staged_files}
      glob: "src/**/*.{js,jsx,ts,tsx,json,yml,yaml}"
    eslint:
      run: npx eslint --cache {staged_files}
      glob: "src/**/*.{ts,tsx}"
    tsc:
      run: tsc -p tsconfig.app.json --noEmit